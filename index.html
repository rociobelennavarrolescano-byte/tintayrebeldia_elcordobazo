<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tinta y Rebeldía — La gráfica del Cordobazo como lenguaje de resistencia</title>
<meta name="description" content="Documental multimedia interactivo sobre el Cordobazo de 1969 a través de la gráfica de resistencia.">
<link rel="stylesheet" href="assets/css/base.css">
<style>
  .landing {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    padding: var(--r-3);
    isolation: isolate;
  }

  /* Fondo: trama de líneas que evocan calles/barricadas, muy sutil */
  .landing__fondo {
    position: absolute;
    inset: 0;
    z-index: -2;
    background:
      radial-gradient(ellipse at 50% 20%, rgba(110,20,35,0.25), transparent 60%),
      var(--negro);
  }

  .landing__fondo svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0.18;
  }

  .landing__eyebrow {
    margin-bottom: var(--r-2);
    opacity: 0;
    animation: subir 900ms 200ms ease forwards;
  }

  .landing__titulo {
    font-size: clamp(2.8rem, 11vw, 7.5rem);
    color: var(--hueso);
    text-shadow: 0.04em 0.04em 0 var(--bordo);
    opacity: 0;
    animation: subir 900ms 400ms ease forwards;
  }

  .landing__subtitulo {
    margin-top: var(--r-3);
    max-width: 38ch;
    font-size: clamp(1.05rem, 2.4vw, 1.4rem);
    opacity: 0;
    animation: subir 900ms 700ms ease forwards;
  }

  .landing__cta {
    margin-top: var(--r-5);
    opacity: 0;
    animation: subir 900ms 1000ms ease forwards;
  }

  @keyframes subir {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .landing__nota {
    position: absolute;
    bottom: var(--r-3);
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--f-subtitulo);
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--hueso-op);
    opacity: 0;
    animation: subir 900ms 1300ms ease forwards;
  }

  @media (prefers-reduced-motion: reduce) {
    .landing__eyebrow, .landing__titulo, .landing__subtitulo,
    .landing__cta, .landing__nota {
      animation: none;
      opacity: 1;
    }
  }
</style>
</head>
<body>

<main class="landing">
  <div class="landing__fondo" aria-hidden="true">
    <svg viewBox="0 0 1200 800" preserveAspectRatio="none">
      <g stroke="#f2ede3" stroke-width="1" fill="none">
        <line x1="0" y1="120" x2="1200" y2="80"/>
        <line x1="0" y1="260" x2="1200" y2="300"/>
        <line x1="0" y1="420" x2="1200" y2="380"/>
        <line x1="0" y1="560" x2="1200" y2="610"/>
        <line x1="0" y1="700" x2="1200" y2="660"/>
        <line x1="150" y1="0" x2="100" y2="800"/>
        <line x1="420" y1="0" x2="460" y2="800"/>
        <line x1="700" y1="0" x2="650" y2="800"/>
        <line x1="950" y1="0" x2="1000" y2="800"/>
      </g>
    </svg>
  </div>

  <p class="landing__eyebrow eyebrow">Documental multimedia interactivo</p>
  <h1 class="landing__titulo">Tinta y<br>Rebeldía</h1>
  <p class="landing__subtitulo lead">La gráfica del Cordobazo como lenguaje de resistencia.</p>

  <a class="landing__cta btn btn--solido" href="contexto.html">Comenzar la experiencia</a>

  <p class="landing__nota">29 de mayo de 1969 — Córdoba, Argentina</p>
</main>

</body>
</html>
